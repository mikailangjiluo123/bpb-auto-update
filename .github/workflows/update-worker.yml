name: Update to Version Specified in bpbversion.txt

on:
  push:
    branches:
      - main
    paths:
      - 'bpbversion.txt'
  workflow_dispatch:
    inputs:
      version:
        description: '目标版本号 (例如 v4.1.2)'
        required: false
        default: 'v4.1.2'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 获取目标版本号
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(cat bpbversion.txt | tr -d '[:space:]')
          fi
          echo "TARGET_VERSION=$VERSION" >> $GITHUB_ENV
          echo "目标版本: $VERSION"

      - name: 检查是否已是最新
        run: |
          CURRENT=$(cat version.txt 2>/dev/null || echo "")
          if [ "$CURRENT" = "${{ env.TARGET_VERSION }}" ]; then
            echo "UPDATE_NEEDED=false" >> $GITHUB_ENV
          else
            echo "UPDATE_NEEDED=true" >> $GITHUB_ENV
            echo "需要更新: $CURRENT -> ${{ env.TARGET_VERSION }}"
          fi

      - name: 下载并解压（若需要）
        if: env.UPDATE_NEEDED == 'true'
        run: |
          URL="https://github.com/bia-pain-bache/BPB-Worker-Panel/releases/download/${{ env.TARGET_VERSION }}/worker.zip"
          curl -L -o worker.zip "$URL"
          unzip -q worker.zip
          rm worker.zip
          echo "${{ env.TARGET_VERSION }}" > version.txt
          # 保留 bpbversion.txt 和 version.txt，删除其他旧文件（保留 .git）
          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name 'bpbversion.txt' ! -name 'version.txt' -exec rm -rf {} + 2>/dev/null || true

      - name: 提交并推送（强制覆盖，解决冲突）
        if: env.UPDATE_NEEDED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "更新到 ${{ env.TARGET_VERSION }}" || echo "无变更"
          git push origin main --force
