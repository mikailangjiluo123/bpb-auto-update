name: Update to Version Specified in bpbversion.txt

on:
  push:
    branches:
      - main
    paths:
      - 'bpbversion.txt'   # 只有修改这个文件时才触发
  workflow_dispatch:        # 也支持手动运行，此时可以手动输入版本号（可选）

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 初始化仓库
        uses: actions/checkout@v4

      - name: 读取 bpbversion.txt 中的目标版本号
        id: read_target
        run: |
          if [ ! -f bpbversion.txt ]; then
            echo "错误：仓库中没有 bpbversion.txt 文件！"
            exit 1
          fi
          TARGET_VERSION=$(cat bpbversion.txt | tr -d '[:space:]')   # 去除空格换行
          if [ -z "$TARGET_VERSION" ]; then
            echo "错误：bpbversion.txt 内容为空！"
            exit 1
          fi
          echo "目标版本: $TARGET_VERSION"
          echo "TARGET_VERSION=$TARGET_VERSION" >> $GITHUB_ENV

      - name: 获取当前本地版本（如果有）
        id: current_version
        run: |
          if [ -f version.txt ]; then
            CURRENT_VERSION=$(cat version.txt)
            echo "当前版本: $CURRENT_VERSION"
          else
            CURRENT_VERSION=""
            echo "未找到 version.txt，可能是首次部署"
          fi
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV

      - name: 判断是否需要更新
        id: need_update
        run: |
          if [ "${{ env.CURRENT_VERSION }}" = "${{ env.TARGET_VERSION }}" ]; then
            echo "当前已经是目标版本 ${{ env.TARGET_VERSION }}，无需更新"
            echo "UPDATE_NEEDED=false" >> $GITHUB_ENV
          else
            echo "需要更新：${{ env.CURRENT_VERSION }} -> ${{ env.TARGET_VERSION }}"
            echo "UPDATE_NEEDED=true" >> $GITHUB_ENV
          fi

      - name: 根据目标版本号构造下载 URL 并下载
        if: env.UPDATE_NEEDED == 'true'
        run: |
          # 构造 GitHub Release 下载地址（假定格式规范）
          DOWNLOAD_URL="https://github.com/bia-pain-bache/BPB-Worker-Panel/releases/download/${{ env.TARGET_VERSION }}/worker.zip"
          echo "下载地址: $DOWNLOAD_URL"
          
          # 测试该 URL 是否有效（可选）
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$DOWNLOAD_URL")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "错误：版本 ${{ env.TARGET_VERSION }} 不存在或 worker.zip 无法下载 (HTTP $HTTP_CODE)"
            exit 1
          fi
          
          # 下载并解压
          rm -rf ./*       # 清理旧文件（谨慎：会删除所有非隐藏文件）
          wget -O worker.zip "$DOWNLOAD_URL"
          unzip -q worker.zip
          rm worker.zip
          
          # 写入当前版本标记文件
          echo "${{ env.TARGET_VERSION }}" > version.txt
          
          # 注意：这里没有删除 bpbversion.txt，它会被保留

      - name: 提交更改
        if: env.UPDATE_NEEDED == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📦 根据 bpbversion.txt 更新到版本 ${{ env.TARGET_VERSION }}"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          # 移除 force push，避免覆盖他人提交
