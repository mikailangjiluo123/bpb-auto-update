name: Sync BPB Panel (Pages Version)

on:
  workflow_dispatch:          # 手动运行
  schedule:
    - cron: "0 0 * * *"      # 每天 UTC 00:00 自动运行
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 获取上游最新代码
        run: |
          # 添加上游仓库
          git remote add upstream https://github.com/bia-pain-bache/BPB-Worker-Panel.git
          git fetch upstream

      - name: 检查是否需要更新
        id: check_update
        run: |
          # 获取当前版本（从 version.txt 或文件修改时间判断）
          if [ -f version.txt ]; then
            LOCAL_VERSION=$(cat version.txt)
            echo "当前本地版本: $LOCAL_VERSION"
          else
            LOCAL_VERSION="none"
            echo "首次同步，无本地版本"
          fi

          # 获取上游最新 commit hash
          UPSTREAM_HASH=$(git rev-parse upstream/main)
          LOCAL_HASH=$(git rev-parse HEAD)
          
          echo "UPSTREAM_HASH=$UPSTREAM_HASH" >> $GITHUB_ENV
          echo "LOCAL_HASH=$LOCAL_HASH" >> $GITHUB_ENV
          
          if [ "$UPSTREAM_HASH" = "$LOCAL_HASH" ]; then
            echo "已经是最新版本，无需更新"
            echo "UPDATE_NEEDED=false" >> $GITHUB_ENV
          else
            echo "发现上游更新，需要同步"
            echo "UPDATE_NEEDED=true" >> $GITHUB_ENV
          fi

      - name: 同步上游代码
        if: env.UPDATE_NEEDED == 'true'
        run: |
          # 合并上游 main 分支
          git merge upstream/main --allow-unrelated-histories -m "chore: 同步 BPB Panel 上游更新" || true
          
          # 确保 _worker.js 存在（Pages 部署需要）
          if [ ! -f _worker.js ]; then
            echo "错误：未找到 _worker.js 文件"
            exit 1
          fi
          
          # 记录版本信息
          VERSION=$(git log -1 --format=%cd --date=short)
          echo "$VERSION" > version.txt
          echo "同步完成，版本: $VERSION"

      - name: 提交并推送更新
        if: env.UPDATE_NEEDED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: 自动同步 BPB Panel Pages 分支"
          git push origin main

      - name: 创建通知 Issue
        if: env.UPDATE_NEEDED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toLocaleDateString('zh-CN');
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔄 BPB Panel 已自动同步 (${today})`,
              body: `BPB Worker Panel 已成功同步到最新代码。\n\n如需重新部署，请前往 Cloudflare Pages 点击 **重试部署**。\n\n> 此 Issue 由 GitHub Actions 自动创建。`
            });
